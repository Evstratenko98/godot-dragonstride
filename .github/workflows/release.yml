name: Manual Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-release:
    name: Build and release Windows
    runs-on: windows-latest

    env:
      GODOT_VERSION: "4.6"
      GODOT_RELEASE: "4.6-stable"
      EXPORT_PRESET: "Windows Desktop"
      EXPORT_DIR: "build"
      APP_NAME: "dragonstride"
      ARCHIVE_NAME: "dragonstride-windows.zip"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Godot
        run: |
          Invoke-WebRequest `
            -Uri "https://github.com/godotengine/godot-builds/releases/download/$env:GODOT_RELEASE/Godot_v$env:GODOT_RELEASE_win64.exe.zip" `
            -OutFile godot.zip
          Expand-Archive -Path godot.zip -DestinationPath godot
          $GodotBin = Get-ChildItem -Path godot -Recurse -Filter "Godot_v*_win64.exe" | Select-Object -First 1 -ExpandProperty FullName
          "GODOT_BIN=$GodotBin" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Install Godot export templates
        run: |
          Invoke-WebRequest `
            -Uri "https://github.com/godotengine/godot-builds/releases/download/$env:GODOT_RELEASE/Godot_v$env:GODOT_RELEASE_export_templates.tpz" `
            -OutFile export_templates.zip
          Expand-Archive -Path export_templates.zip -DestinationPath export_templates
          $TemplateDir = Join-Path $env:APPDATA "Godot\export_templates\$env:GODOT_VERSION.stable"
          New-Item -ItemType Directory -Force -Path $TemplateDir
          Copy-Item -Path "export_templates\templates\*" -Destination $TemplateDir -Recurse -Force

      - name: Export Windows build
        run: |
          New-Item -ItemType Directory -Force -Path $env:EXPORT_DIR
          & $env:GODOT_BIN --headless --import
          & $env:GODOT_BIN --headless --export-release "$env:EXPORT_PRESET" "$env:EXPORT_DIR\$env:APP_NAME.exe"

      - name: Verify console wrapper
        run: |
          $ConsoleExe = Join-Path $env:EXPORT_DIR "$env:APP_NAME.console.exe"
          if (-not (Test-Path $ConsoleExe)) {
            throw "Expected console wrapper was not exported: $ConsoleExe"
          }

      - name: Add Steam runtime files
        run: |
          Copy-Item -Path "addons\godotsteam\win64\steam_api64.dll" -Destination $env:EXPORT_DIR -Force
          Copy-Item -Path "addons\godotsteam\win64\libgodotsteam.windows.template_release.x86_64.dll" -Destination $env:EXPORT_DIR -Force
          if (Test-Path steam_appid.txt) {
            Copy-Item -Path steam_appid.txt -Destination $env:EXPORT_DIR -Force
          }

      - name: Create release archive
        run: |
          Compress-Archive -Path "$env:EXPORT_DIR\*" -DestinationPath $env:ARCHIVE_NAME -Force

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: ${{ inputs.tag }}
          files: ${{ env.ARCHIVE_NAME }}
